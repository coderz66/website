<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research Note</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;0,8..60,600;0,8..60,700;1,8..60,400;1,8..60,500&family=Noto+Serif+SC:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<div id="memo-root"></div>

<script src="assets/data.js"></script>
<script src="assets/render.js"></script>
<script>
  // Read ?id= from URL
  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");
  const memo = MEMOS.find(m => m.id === id);
  const root = document.getElementById("memo-root");

  if (!memo) {
    root.innerHTML = `
      <div class="memo-page">
        <a href="index.html" class="back-link">Research Archive</a>
        <p style="color:var(--ink-soft);font-style:italic;padding:40px 0">
          未找到 id 为 "${id || "(空)"}" 的研究笔记。请从首页重新选择。
        </p>
      </div>
    `;
  } else {
    // Set document title
    const plainTitle = memo.title.replace(/<[^>]+>/g, "");
    document.title = plainTitle + " · Research Archive";

    // Render
    root.innerHTML = renderMemo(memo);

    // Initialize tab switching if multiview
    if (memo.template === "multiview") {
      initMultiview();
    }
  }
</script>

</body>
</html>
