<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research Archive · 研究档案馆</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;0,8..60,600;0,8..60,700;1,8..60,400;1,8..60,500&family=Noto+Serif+SC:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<div class="archive-page">

  <div class="archive-head">
    <h1>Research <em>Archive</em></h1>
    <div class="archive-meta">
      <span class="dot"></span><span id="meta-count">0 notes</span><br>
      <span id="meta-updated">—</span>
    </div>
  </div>

  <div class="filter-bar">
    <div class="filter-row">
      <div class="cat-tabs" id="cat-tabs"></div>
      <input type="text" class="search-box" id="search-box" placeholder="搜索标题 / 公司 / 代码...">
    </div>
    <div class="filter-row">
      <div class="tag-cloud" id="tag-cloud"></div>
    </div>
  </div>

  <div class="cards-grid" id="cards-grid"></div>

  <div class="empty-state" id="empty-state" style="display:none">
    没有找到符合条件的研究笔记。
  </div>

</div>

<script src="assets/data.js"></script>
<script>
  const state = {
    category: "All",
    tags: new Set(),
    search: ""
  };

  // ---- Collect metadata ----
  const allCategories = ["All", ...new Set(MEMOS.map(m => m.meta.category))];
  const allTags = [...new Set(MEMOS.flatMap(m => m.meta.tags))].sort();

  // ---- Render filter UI ----
  const catTabs = document.getElementById("cat-tabs");
  catTabs.innerHTML = allCategories.map(c =>
    `<button class="cat-tab ${c === "All" ? "active" : ""}" data-cat="${c}">${c === "All" ? "All" : c}</button>`
  ).join("");

  const tagCloud = document.getElementById("tag-cloud");
  tagCloud.innerHTML = `<span class="tag-cloud-label">Tags</span>` +
    allTags.map(t =>
      `<button class="tag-chip" data-tag="${t}">${t}</button>`
    ).join("");

  // ---- Event handlers ----
  catTabs.addEventListener("click", e => {
    if (!e.target.dataset.cat) return;
    state.category = e.target.dataset.cat;
    document.querySelectorAll(".cat-tab").forEach(t =>
      t.classList.toggle("active", t.dataset.cat === state.category)
    );
    render();
  });

  tagCloud.addEventListener("click", e => {
    const tag = e.target.dataset.tag;
    if (!tag) return;
    if (state.tags.has(tag)) state.tags.delete(tag);
    else state.tags.add(tag);
    e.target.classList.toggle("active");
    render();
  });

  document.getElementById("search-box").addEventListener("input", e => {
    state.search = e.target.value.trim().toLowerCase();
    render();
  });

  // ---- Render cards ----
  function render() {
    let filtered = MEMOS.slice();

    // Category filter
    if (state.category !== "All") {
      filtered = filtered.filter(m => m.meta.category === state.category);
    }

    // Tag filter (AND logic — memo must have ALL selected tags)
    if (state.tags.size > 0) {
      filtered = filtered.filter(m =>
        [...state.tags].every(t => m.meta.tags.includes(t))
      );
    }

    // Search
    if (state.search) {
      filtered = filtered.filter(m => {
        const blob = `${m.title} ${m.subtitle} ${m.meta.ticker} ${m.meta.company} ${m.summary}`.toLowerCase();
        return blob.includes(state.search);
      });
    }

    // Sort by date desc
    filtered.sort((a, b) => b.date.localeCompare(a.date));

    const grid = document.getElementById("cards-grid");
    const empty = document.getElementById("empty-state");

    if (filtered.length === 0) {
      grid.innerHTML = "";
      empty.style.display = "block";
    } else {
      empty.style.display = "none";
      grid.innerHTML = filtered.map(m => `
        <a class="card" href="view.html?id=${encodeURIComponent(m.id)}">
          <div class="card-head">
            <span class="card-category">${m.meta.category}</span>
            <span class="card-date">${formatDate(m.date)}</span>
          </div>
          <div class="card-ticker"><strong>${m.meta.ticker}</strong> · ${m.meta.company} · ${m.meta.industry}</div>
          <div class="card-title">${stripEm(m.title)}</div>
          <div class="card-summary">${m.summary}</div>
          <div class="card-foot">
            <div class="card-tags">
              ${m.meta.tags.slice(0, 3).map(t => `<span class="card-tag">${t}</span>`).join("")}
            </div>
            <div class="card-template">${m.template}</div>
          </div>
        </a>
      `).join("");
    }

    // Update meta
    document.getElementById("meta-count").textContent = `${filtered.length} / ${MEMOS.length} notes`;
  }

  function formatDate(d) {
    const [y, m, day] = d.split("-");
    return `${y}.${parseInt(m)}.${parseInt(day)}`;
  }

  function stripEm(html) {
    // Keep <em> for visual emphasis in card titles
    return html;
  }

  // Last updated
  const latestDate = MEMOS.reduce((max, m) => m.date > max ? m.date : max, "0000-00-00");
  document.getElementById("meta-updated").textContent = `Last · ${formatDate(latestDate)}`;

  render();
</script>

</body>
</html>
